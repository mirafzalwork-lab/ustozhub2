name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ustozhub
          POSTGRES_PASSWORD: ustozhub
          POSTGRES_DB: ustozhub
        options: >-
          --health-cmd "pg_isready -U ustozhub"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 6379:6379

    env:
      DJANGO_SETTINGS_MODULE: core.settings
      DEBUG: "False"
      SECRET_KEY: "ci-secret-key-not-for-production-only-for-tests"
      DATABASE_URL: "postgres://ustozhub:ustozhub@localhost:5432/ustozhub"
      REDIS_URL: "redis://localhost:6379/0"
      ALLOWED_HOSTS: "localhost,127.0.0.1,testserver"
      CSRF_TRUSTED_ORIGINS: "http://localhost,http://127.0.0.1"
      # Заглушки, чтобы не падали импорты сторонних сервисов
      TELEGRAM_BOT_TOKEN: "ci-stub"
      S3_ACCESS_KEY_ID: "ci-stub"
      S3_SECRET_ACCESS_KEY: "ci-stub"
      S3_BUCKET_NAME: "ci-stub"
      S3_ENDPOINT_URL: "https://example.com"
      S3_PUBLIC_URL: "https://example.com"
      GOOGLE_CLIENT_ID: "ci-stub"
      GOOGLE_CLIENT_SECRET: "ci-stub"
      JITSI_BASE_URL: "https://meet.example.com"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # На случай если в requirements.txt нет — гарантируем что есть
          pip install celery redis django-ratelimit

      - name: Django system check
        run: python manage.py check

      - name: Detect un-applied migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Apply migrations
        run: python manage.py migrate --noinput

      - name: Run regression suite
        run: python manage.py shell < scripts/regression_test.py

      - name: Check JS syntax (Node)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Node check static JS
        run: |
          for f in static/js/*.js; do
            node --check "$f" || exit 1
          done
          echo "All JS files have valid syntax."

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install audit tools
        run: pip install bandit pip-audit
      - name: Bandit (Python security linter)
        # -ll: warn from medium, -ii: confidence medium+; не падаем на низких
        run: bandit -r teachers core -ll -ii --skip B101,B404,B603,B607 || true
      - name: pip-audit (CVE check)
        # Не падаем на mode soft — пока репорт информационный
        run: pip-audit -r requirements.txt --disable-pip || true
