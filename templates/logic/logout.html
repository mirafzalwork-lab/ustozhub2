{% extends 'base.html' %}

{% block title %}Выход - UstozHub{% endblock %}

{% block extra_css %}
<style>
    .confirm-container {
        min-height: calc(100vh - 200px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 16px;
    }

    .confirm-card {
        background: white;
        border-radius: 16px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        width: 100%;
        max-width: 400px;
        padding: 40px;
        text-align: center;
    }

    .confirm-icon {
        width: 64px;
        height: 64px;
        background: #fef3c7;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
        font-size: 28px;
        color: #f59e0b;
    }

    .confirm-card h2 {
        font-size: 24px;
        font-weight: 700;
        color: #1a1a1a;
        margin-bottom: 12px;
    }

    .confirm-card p {
        color: #666;
        font-size: 15px;
        margin-bottom: 32px;
    }

    .button-group {
        display: flex;
        gap: 12px;
    }

    .btn {
        flex: 1;
        padding: 12px 24px;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        text-decoration: none;
        display: inline-block;
    }

    .btn-primary {
        background: #ef4444;
        color: white;
    }

    .btn-primary:hover {
        background: #dc2626;
    }

    .btn-secondary {
        background: #f5f5f5;
        color: #666;
    }

    .btn-secondary:hover {
        background: #e5e5e5;
    }
</style>
{% endblock %}

{% block content %}
<div class="confirm-container">
    <div class="confirm-card">
        <div class="confirm-icon">
            <i class="fas fa-sign-out-alt"></i>
        </div>
        <h2>Выйти из аккаунта?</h2>
        <p>Вы уверены, что хотите выйти из своего аккаунта?</p>
        
        <form method="post" style="margin: 0;">
            {% csrf_token %}
            <div class="button-group">
                <a href="{% url 'home' %}" class="btn btn-secondary">
                    Отмена
                </a>
                <button type="submit" class="btn btn-primary">
                    Выйти
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
