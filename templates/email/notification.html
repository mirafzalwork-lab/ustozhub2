{% load i18n %}<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE|default:'ru' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
</head>
<body style="margin:0;padding:0;background:#f1f5f9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#0f172a;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f1f5f9;padding:24px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:560px;background:#ffffff;border-radius:14px;overflow:hidden;box-shadow:0 4px 18px rgba(15,23,42,.08);">
          <!-- Header -->
          <tr>
            <td style="background:#0A2540;padding:22px 28px;">
              <a href="{{ site_url }}" style="color:#ffffff;text-decoration:none;font-size:20px;font-weight:700;letter-spacing:.3px;">UstozHub</a>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding:30px 28px 8px 28px;">
              <h1 style="margin:0 0 14px 0;font-size:20px;line-height:1.35;font-weight:700;color:#0f172a;">{{ title }}</h1>
              <div style="margin:0;font-size:15px;line-height:1.6;color:#334155;white-space:pre-line;">{{ full_text }}</div>
            </td>
          </tr>
          {% if action_url %}
          <tr>
            <td style="padding:22px 28px 4px 28px;">
              <a href="{{ action_url }}" style="display:inline-block;background:#2563EB;color:#ffffff;text-decoration:none;font-size:15px;font-weight:600;padding:12px 26px;border-radius:10px;">{% trans 'Открыть' %} &rarr;</a>
            </td>
          </tr>
          {% endif %}
          <!-- Footer -->
          <tr>
            <td style="padding:26px 28px 28px 28px;">
              <hr style="border:none;border-top:1px solid #e2e8f0;margin:0 0 16px 0;">
              <p style="margin:0;font-size:12px;line-height:1.6;color:#94a3b8;">
                {% blocktrans %}Это автоматическое уведомление от платформы UstozHub. Отвечать на него не нужно.{% endblocktrans %}<br>
                <a href="{{ site_url }}" style="color:#64748b;text-decoration:underline;">{{ site_url }}</a>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
